services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                VITE_API_URL: https://api.reverieapp.dev
        container_name: reverie-backend
        # env_file is an absolute path so it works regardless of where
        # docker compose is invoked from (CI runner checkout dir vs /opt/reverie)
        env_file:
            - /opt/reverie/.env.production
        ports:
            # Bind to loopback only — nginx on the host proxies to this port
            - '127.0.0.1:3000:3000'
        volumes:
            # Mount NAS storage so backend can read/write user files
            - /mnt/nas/reverie:/mnt/nas/reverie
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: reverie-postgres
        ports:
            - '127.0.0.1:5432:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            # POSTGRES_PASSWORD is read from the runner environment,
            # which is populated via --env-file /opt/reverie/.env.production
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U reverie']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: reverie-redis
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:
