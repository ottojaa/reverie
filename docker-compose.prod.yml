services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                VITE_API_URL: https://api.reverieapp.dev
                # GPU image (CUDA 12.6 paddlepaddle-gpu). Set to false for CPU-only.
                OCR_GPU: 'true'
        container_name: reverie-backend
        # env_file is an absolute path so it works regardless of where
        # docker compose is invoked from (CI runner checkout dir vs /opt/reverie)
        env_file:
            - /opt/reverie/.env.production
        environment:
            # Expose the host GPU to PaddleOCR. 'compute' is required for CUDA/cuDNN;
            # without it CUDA init silently fails on this non-NVIDIA base image.
            # Set OCR_DEVICE=gpu:0 in /opt/reverie/.env.production to actually use it.
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        ports:
            # Bind to loopback only — nginx on the host proxies to this port
            - '127.0.0.1:3000:3000'
        volumes:
            # Mount NAS storage so backend can read/write user files
            - /mnt/nas/reverie:/mnt/nas/reverie
            # Persist PaddleOCR PP-OCRv5 models (~210MB, HOME=/root -> ~/.paddlex) so they
            # download once and survive container recreates. Models are NOT baked into the
            # image because importing the GPU paddle wheel needs libcuda.so.1 at build time.
            - ocr_models:/root/.paddlex
        # Reserve the NVIDIA GPU (requires NVIDIA Container Toolkit on the host).
        # `gpus: all` is a cleaner alternative on Compose >= v2.30.
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: 1
                          capabilities: [gpu]
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: reverie-postgres
        ports:
            - '127.0.0.1:5432:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            # POSTGRES_PASSWORD is read from the runner environment,
            # which is populated via --env-file /opt/reverie/.env.production
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U reverie']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: reverie-redis
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:
    ocr_models:
