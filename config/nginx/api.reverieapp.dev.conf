# Nginx config for api.reverieapp.dev
#
# Handles:
#   - API proxy to backend container on :3000 (including WebSocket / Socket.IO)
#   - Secure file serving via nginx secure_link (signed URLs from backend)
#
# Prerequisites:
#   - nginx compiled with ngx_http_secure_link_module (default on Ubuntu/Debian)
#   - FILE_URL_SECRET in .env.production must match $secure_link_secret below
#
# Installation:
#   sudo cp api.reverieapp.dev.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/api.reverieapp.dev.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.reverieapp.dev   # adds SSL automatically

upstream reverie_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.reverieapp.dev;

    client_max_body_size 5000M;

    # Secure file serving with signed URLs
    # URL format: /files/{path}?e={expires}&s={signature}
    location /files/ {
        # IMPORTANT: Must match FILE_URL_SECRET in .env.production exactly
        set $secure_link_secret "CHANGE_ME_MATCH_FILE_URL_SECRET";

        # Verify signature: md5(expires + uri + secret) encoded as base64url
        secure_link $arg_s,$arg_e;
        secure_link_md5 "$arg_e$uri$secure_link_secret";

        if ($secure_link = "") {
            return 403;
        }

        if ($secure_link = "0") {
            return 410;
        }

        # Strip /files/ prefix and serve directly from NAS storage root
        alias /mnt/nas/reverie/;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header Cache-Control "private, max-age=86400, immutable";

        # CORS: hardcoded so it works when CDN/proxy strips Origin header
        add_header Access-Control-Allow-Origin "https://www.reverieapp.dev" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://www.reverieapp.dev";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        gzip on;
        gzip_types text/plain application/json application/javascript text/css;
    }

    # All other requests (including Socket.IO) proxy to the backend container
    location / {
        proxy_pass http://reverie_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / Socket.IO upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Extended timeouts for long-running OCR/LLM requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }
}
