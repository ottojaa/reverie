# Nginx config for www.reverieapp.dev (React SPA)
#
# Serves the static Vite build from /opt/reverie/web (populated by CI on each deploy).
# The bare domain reverieapp.dev redirects to www.
#
# Installation:
#   sudo cp www.reverieapp.dev.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/www.reverieapp.dev.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d reverieapp.dev -d www.reverieapp.dev

# Redirect bare domain to www (HTTP)
server {
    listen 80;
    server_name reverieapp.dev;
    return 301 https://www.reverieapp.dev$request_uri;
}

# HTTP -> HTTPS redirect for www
server {
    listen 80;
    server_name www.reverieapp.dev;
    return 301 https://$host$request_uri;
}

# HTTPS - serve the SPA
server {
    listen 443 ssl http2;
    server_name www.reverieapp.dev;

    ssl_certificate /etc/letsencrypt/live/reverieapp.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reverieapp.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/reverie/web;
    index index.html;

    # SPA fallback: all routes served by index.html (TanStack Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets (Vite adds content hashes)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Medium cache for images and icons
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html (always fetches latest SPA shell)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
