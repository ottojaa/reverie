nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.17.1.cjs

enableScripts: true

# Supply-chain cooldown: refuse package versions younger than 14 days. For a version
# range, Yarn selects the newest release older than this window; it only errors when a
# range (or exact transitive pin) has no release that old — handled via resolutions.
npmMinimalAgeGate: 14d

# Allow git-protocol dependencies to run build scripts (added on the Berry migration).
approvedGitRepositories:
    - '**'
